name: TWS CD Workflow

on: 
    workflow_run:
        workflows: ["TWS CI Workflow"] 
        types: [completed]

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4 # this happens in the runner

            - name: Execute remote SSH commands using password
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.HOST }}
                  username: ${{ secrets.USERNAME }}
                  key: ${{ secrets.PASSWORD }}
                  script: |
                    git clone https://github.com/AbhijitSonar/github-actions-demo
                    cd ~/github-actions-demo
                    git pull origin main
                    docker compose pull
                    docker compose down && docker compose up -d